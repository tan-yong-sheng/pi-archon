name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - id: release-meta
        run: |
          tag_name="${GITHUB_REF_NAME}"
          release_version="${tag_name#v}"

          if [[ -z "$release_version" || "$release_version" == "$tag_name" ]]; then
            echo "Expected a v-prefixed tag, got ${tag_name}." >&2
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync package version to release tag
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_VERSION: ${{ steps.release-meta.outputs.release_version }}
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

          if git diff --quiet -- package.json; then
            echo "package.json already matches ${RELEASE_VERSION}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Release ${TAG_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release ${TAG_NAME} already exists; skipping create."
            exit 0
          fi

          gh release create "$TAG_NAME" --generate-notes --title "$TAG_NAME" --verify-tag